<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatDepZai</title>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            DatDepZai
        </div>
        <div class="menu-icon">
            ☰
        </div>
        <nav class="menu">
            <a href="#">Trang chủ</a>
            <a href="#">Điện thoại</a>
            <a href="#">Laptop</a>
            <a href="#">Phụ kiện</a>
        </nav>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <p>Danh mục</p>
            <label><input type="checkbox"> Điện thoại</label>
            <label><input type="checkbox"> Laptop</label>
            <label><input type="checkbox"> Tablet</label>
        </aside>

        <main class="main">
            <div class="tablet-filter">
                <select>
                    <option>Sắp xếp sản phẩm</option>
                    <option>Giá tăng dần</option>
                    <option>Giá giảm dần</option>
                </select>
            </div>

            <div class="product-grid">
                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>iPhone 15</h3>
                    <p>22.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>Samsung S24</h3>
                    <p>18.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>MacBook Air</h3>
                    <p>28.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>iPad Pro</h3>
                    <p>24.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>AirPods Pro</h3>
                    <p>5.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>Xiaomi 14</h3>
                    <p>16.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>Dell XPS</h3>
                    <p>35.990.000đ</p>
                    <button>Mua ngay</button>
                </div>

                <div class="card">
                    <img src="https://placehold.co/300x200" alt="">
                    <h3>Apple Watch</h3>
                    <p>10.990.000đ</p>
                    <button>Mua ngay</button>
                </div>
            </div>
        </main>

        <aside class="ads">
            <div class="ads-box">
                Quảng cáo
            </div>
        </aside>
    </div>

    <footer class="footer">
        <p>2026 DatDepZai</p>
    </footer>
</body>

</html>
