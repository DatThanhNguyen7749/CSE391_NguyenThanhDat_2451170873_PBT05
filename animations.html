<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations Demo</title>
    <link rel="stylesheet" href="animations.css">
</head>

<body>
    <h1>CSS Animations Demo</h1>
    <section>
        <h2>1. Card Hover Effect</h2>
        <div class="card-container">
            <div class="card">
                <div class="image-box">
                    <img src="https://placehold.co/300x200" alt="">
                </div>
                <h3>iPhone 15</h3>
                <p>22.990.000đ</p>
                <button>Mua ngay</button>
            </div>
        </div>
    </section>

    <section>
        <h2>2. Button Hover</h2>
        <button class="hover-btn">
            Mua ngay
        </button>
    </section>

    <section>
        <h2>3. Image Zoom</h2>
        <div class="zoom-box">
            <img src="https://placehold.co/400x250" alt="">
        </div>
    </section>

    <section>
        <h2>4. Loading Spinner</h2>
        <div class="spinner"></div>

    </section>

    <section>
        <h2>5. Fade In Animation</h2>
        <div class="fade-box">
            Fade In Box
        </div>

    </section>
</body>

</html>
